# LiveKit 生产配置
#
# 关键差异 vs dev:
#   - rtc.use_external_ip: true → 让 client 看到生产服务器公网 IP
#   - port_range 50000-50099（更大并发）
#   - max_participants 提高（按业务调）
#   - 日志走 INFO 不是 debug

port: 7880

# 容器内监听全部接口；外部隔离由 docker port mapping + 防火墙控制
bind_addresses:
  - ""

rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50099
  # LAN 部署：关闭 STUN 自动发现（不查公网 IP）
  # node_ip 由 docker-compose command 行 --node-ip 显式注入（yaml 不支持 env var 替换）
  use_external_ip: false

# 日志（prod 简洁）
logging:
  level: info
  json: true                # 生产建议 JSON 便于聚合

# 房间默认设置
room:
  enabled_codecs:
    - mime: audio/opus
    - mime: video/vp8
    - mime: video/h264
  empty_timeout: 86400         # 24h；防止 agent 在空房 5min 后被踢
  max_participants: 16          # 按业务上限调

# Webhook（可选，让 token-server 接收事件）
# webhook:
#   api_key: <key>
#   urls:
#     - https://your-domain.example.com/webhook
