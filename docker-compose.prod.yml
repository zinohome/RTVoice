# RTVoice 生产覆盖
#
# 用法：
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile prod up -d
#
# 与 dev 的差异：
#   - llm-server 切到 vLLM GPU（Qwen2.5-3B-Instruct-GPTQ-Int4，~3GB VRAM）
#   - stt-server 切到 sherpa-onnx GPU 镜像（同协议，仅 provider=cuda）
#   - tts-server v0.5+ 暂仍 Kokoro CPU（CosyVoice 2 集成留 v0.6）
#   - livekit 用 livekit.prod.yaml（rtc.use_external_ip=true，UDP 50000-50099）
#   - token-server 加 rate limit；BIND_HOST 由 .env.prod 显式决定
#
# 生产前必读 [SECURITY.md](./SECURITY.md) §4 迁移协议
#
# GPU 资源声明语法：deploy.resources.reservations.devices（compose v2 标准）

services:
  # ---------------------------------------------------------------
  # LiveKit — 公网 SFU
  # ---------------------------------------------------------------
  livekit-server:
    image: livekit/livekit-server:v1.11.0
    ports:
      # BIND_HOST 必须由用户在 .env 显式配（默认空，启动会失败）
      - "${BIND_HOST:?BIND_HOST 未配置；prod 必须显式指定，禁止默认}:${LIVEKIT_PORT:-7880}:7880"
      - "${BIND_HOST}:${LIVEKIT_RTC_TCP_PORT:-7881}:7881"
      # prod 固定 50000-50099（容器侧一致）；不读 .env 的 dev 范围
      - "${BIND_HOST}:50000-50099:50000-50099/udp"
    volumes:
      - ./livekit/livekit.prod.yaml:/etc/livekit.yaml:ro
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    # 用 CLI flag --node-ip 显式注入对外宣告 IP（yaml 不支持 env var 替换）
    # ${RTVOICE_NODE_IP:?...} 强制必填（LAN IP，与 LIVEKIT_PUBLIC_URL 主机名一致）
    command:
      - --config
      - /etc/livekit.yaml
      - --node-ip
      - ${RTVOICE_NODE_IP:?RTVOICE_NODE_IP 必须显式（LAN IP，例 192.168.66.163）}

  # ---------------------------------------------------------------
  # Token Server — 公网/限流（dev 同代码，环境变量切 prod）
  # ---------------------------------------------------------------
  token-server:
    image: rtvoice/token-server:v0.5.0
    ports:
      - "${BIND_HOST}:${TOKEN_SERVER_PORT:-8000}:8000"
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LIVEKIT_PUBLIC_URL: ${LIVEKIT_PUBLIC_URL:?LIVEKIT_PUBLIC_URL 必须显式，例 wss://voice.example.com}
      DEV_AUTO_INJECT_KEY: "false"        # 生产绝不注入 key 到测试页
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-30}
    volumes: []   # prod 不挂源码

  # ---------------------------------------------------------------
  # STT Server (GPU) — sherpa-onnx + onnxruntime-gpu
  # ---------------------------------------------------------------
  stt-server:
    build:
      context: .
      dockerfile: services/stt-server/Dockerfile.gpu
    image: rtvoice/stt-server-gpu:v0.5.0
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      STT_NUM_THREADS: 1                  # GPU 时 CPU 线程减少
      STT_PROVIDER: cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_DEVICE_ID:-0}"]
              capabilities: [gpu]
        limits:
          memory: 2G
          cpus: "1.0"

  # ---------------------------------------------------------------
  # LLM Server (GPU) — vLLM + Qwen2.5-3B GPTQ Int4
  # ---------------------------------------------------------------
  # 仅 profile=prod-vllm 时启动；默认 prod 不启动，agent 走 LLM_BASE_URL
  # 指向用户已有的 ollama 或外部 OpenAI 兼容服务（推荐 dev→prod 平滑过渡）
  llm-server:
    image: vllm/vllm-openai:v0.7.0
    container_name: rtvoice-llm
    profiles: ["prod-vllm"]
    restart: unless-stopped
    networks: [rtvoice_net]
    environment:
      HF_HOME: /root/.cache/huggingface
      # 国内可设 hf-mirror 加速
      HF_ENDPOINT: ${HF_ENDPOINT:-https://huggingface.co}
    volumes:
      - rtvoice_hf_cache:/root/.cache/huggingface
    expose:
      - "8000"
    # vLLM CLI 直接吃这些 args（OpenAI 兼容服务）
    command:
      - --model=${LLM_MODEL_PROD:-Qwen/Qwen2.5-3B-Instruct-GPTQ-Int4}
      - --port=8000
      - --host=0.0.0.0
      - --gpu-memory-utilization=${VLLM_GPU_MEM_UTIL:-0.4}
      - --max-model-len=${VLLM_MAX_MODEL_LEN:-4096}
      - --quantization=gptq
      - --dtype=half
      - --served-model-name=${LLM_MODEL:-qwen2.5:3b}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 600s   # 首次启动 + 模型下载 ≤10min
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_DEVICE_ID:-0}"]
              capabilities: [gpu]
        limits:
          memory: 8G
          cpus: "2.0"
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"

  # ---------------------------------------------------------------
  # TTS Server — Kokoro CPU (默认) / CosyVoice 2 GPU (TTS_BACKEND=cosyvoice)
  # ---------------------------------------------------------------
  # 切到 CosyVoice 2 GPU：
  #   1. .env 加 TTS_IMAGE=rtvoice/tts-server-cosyvoice:v0.6.0
  #   2. docker compose build tts-server (会用 Dockerfile.cosyvoice)
  #   3. docker compose up -d
  # 默认走 Kokoro（rtvoice/tts-server:v0.5.0）保持兼容
  tts-server:
    build:
      context: ./services/tts-server
      dockerfile: ${TTS_DOCKERFILE:-Dockerfile}
    image: ${TTS_IMAGE:-rtvoice/tts-server:v0.5.0}
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # CosyVoice 2-0.5B 启动时 add_zero_shot_spk 注册的默认 SFT id
      # （Kokoro 模式忽略此环境变量；仅 Dockerfile.cosyvoice 用）
      TTS_DEFAULT_VOICE: ${TTS_DEFAULT_VOICE:-default_zh_female}
      TTS_DEFAULT_LANG: ${TTS_DEFAULT_LANG:-cmn}
      # Admin endpoints (POST/DELETE /voices/...) Bearer 鉴权
      # 留空 = 禁用 admin（生产建议设置）
      TTS_ADMIN_API_KEY: ${TTS_ADMIN_API_KEY:-}
      # Fun-CosyVoice 3 (Dockerfile.cosyvoice3) 模型下载控制：
      # 1 = 跳过 llm.rl.pt（默认；省 2GB）；0 = 全量下载含 RL 变体
      SKIP_RL_MODEL: ${SKIP_RL_MODEL:-1}
    volumes:
      # CosyVoice 模型持久化卷（首次启动下载 ~5GB；后续重启秒起）
      - rtvoice_cosyvoice_models:/opt/CosyVoice/pretrained_models
    # CosyVoice 模式时启用 GPU（TTS_BACKEND_GPU=true 时下面声明生效）
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_DEVICE_ID:-0}"]
              capabilities: [gpu]
        limits:
          memory: ${TTS_MEM_LIMIT:-8G}
          cpus: "${TTS_CPU_LIMIT:-2.0}"

  # ---------------------------------------------------------------
  # Realtime Voice Server (SP3, v0.10+) — 暴露 host port 给浏览器
  # ---------------------------------------------------------------
  # base compose 里只 expose（docker 内部网络）；prod 加 ports 映射到 BIND_HOST
  # 如走反向代理（Caddy/nginx wss）可改这里指向 127.0.0.1 而非 BIND_HOST
  realtime-server:
    ports:
      - "${BIND_HOST}:${REALTIME_SERVER_PORT:-9000}:9000"

  # ---------------------------------------------------------------
  # Agent Worker — 协议层不变，跑 CPU 即可（不分 GPU）
  # ---------------------------------------------------------------
  agent-worker:
    image: rtvoice/agent-worker:v0.5.0
    # 让容器能解析 host.docker.internal 到宿主 IP
    # 用于连宿主上的 ollama (典型 1Panel/Portainer 已有 ollama 容器)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # prod 默认走宿主 ollama，llm-server 不在 prod profile，故 depends_on 删掉
    # 用 !override 替换 base 的 depends_on（含 llm-server 引用），避免 'undefined service' 错
    depends_on: !override
      livekit-server:
        condition: service_healthy
      stt-server:
        condition: service_healthy
      tts-server:
        condition: service_healthy
    environment:
      # prod 默认走宿主 ollama；要切 vLLM 改成 http://llm-server:8000/v1 + 加 profile prod-vllm
      LLM_BASE_URL: ${LLM_BASE_URL_PROD:-http://host.docker.internal:11434/v1}
      LLM_MODEL: ${LLM_MODEL_PROD:-qwen2.5:7b}

# ---------------------------------------------------------------
# 卷
# ---------------------------------------------------------------
volumes:
  # vLLM 用 HF cache 而非 ollama 卷；rtvoice_ollama_models 在 prod 不挂载（可手动清理）
  rtvoice_hf_cache:
    driver: local
  # CosyVoice 模型卷（5GB；首次下载，后续复用）
  rtvoice_cosyvoice_models:
    driver: local
