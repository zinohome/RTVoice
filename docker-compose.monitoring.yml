# RTVoice 监控栈 overlay（可选）
#
# 用法（dev）:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml \
#                  -f docker-compose.monitoring.yml \
#                  --profile dev --profile monitoring up -d
#
# 用法（prod）：在生产已有监控时跳过；如需独立栈用 prod profile 同样组合
#
# 访问：
#   http://127.0.0.1:9091  Prometheus（避开 livekit 7880/livekit GUI）
#   http://127.0.0.1:3000  Grafana（默认 admin / admin，首次会要求改密码）

services:
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: rtvoice-prometheus
    profiles: ["monitoring"]
    restart: unless-stopped
    networks: [rtvoice_net]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - rtvoice_prometheus_data:/prometheus
    ports:
      - "${BIND_HOST:-127.0.0.1}:9091:9090"  # 9090 给 stt-server，避开
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: rtvoice-grafana
    profiles: ["monitoring"]
    restart: unless-stopped
    networks: [rtvoice_net]
    depends_on: [prometheus]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # 防止默认主页被覆盖
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/rtvoice.json
    volumes:
      - ./monitoring/grafana-provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/dashboards:/var/lib/grafana/dashboards:ro
      - rtvoice_grafana_data:/var/lib/grafana
    ports:
      - "${BIND_HOST:-127.0.0.1}:13000:3000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  rtvoice_prometheus_data:
    driver: local
  rtvoice_grafana_data:
    driver: local
