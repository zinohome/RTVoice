name: pytest

on:
  push:
    branches: [main]
    paths:
      - 'services/agent-worker/**'
      - '.github/workflows/pytest.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/agent-worker/**'

jobs:
  agent-worker-units:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/agent-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pytest pytest-asyncio numpy
      - run: pytest tests/ -v
