# RTVoice 公共 compose 定义
# 用法：
#   开发：docker compose -f docker-compose.yml -f docker-compose.dev.yml --profile dev up -d
#   生产：docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile prod up -d
# 安全：见 SECURITY.md
#   - 端口默认绑 ${BIND_HOST}=127.0.0.1（dev），prod 由用户决策
#   - 镜像 pin 具体版本，禁用 :latest
#   - 不使用 --privileged / network=host

name: rtvoice

networks:
  rtvoice_net:
    driver: bridge

volumes:
  rtvoice_ollama_models:
    driver: local
  # rtvoice_prom_data / rtvoice_grafana_data 移到 docker-compose.monitoring.yml
  # (本 base 不再包含 prometheus + grafana 服务定义)
  rtvoice_redis_data:
    driver: local

services:
  # ---------------------------------------------------------------
  # LiveKit WebRTC SFU
  # ---------------------------------------------------------------
  livekit-server:
    # 升级前请先到 https://github.com/livekit/livekit/releases 验证版本
    image: livekit/livekit-server:v1.11.0
    container_name: rtvoice-livekit
    profiles: ["dev", "prod"]
    restart: unless-stopped
    networks: [rtvoice_net]
    # LiveKit 接受 LIVEKIT_KEYS 环境变量，格式 "key: secret"
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    # 配置文件由 dev/prod override 挂载
    command: ["--config", "/etc/livekit.yaml"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:7880/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ---------------------------------------------------------------
  # Token Server (FastAPI) — 给客户端发 LiveKit JWT
  # ---------------------------------------------------------------
  token-server:
    build:
      context: .
      dockerfile: services/token-server/Dockerfile
    image: rtvoice/token-server:v0.19.0
    container_name: rtvoice-token
    profiles: ["dev", "prod"]
    restart: unless-stopped
    networks: [rtvoice_net]
    depends_on:
      livekit-server:
        condition: service_healthy
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      # /token 端点的访问 key（客户端 Bearer header）。必须 ≥ 32 字符。
      APP_API_KEY: ${APP_API_KEY}
      # 浏览器侧用的 ws URL（公网或本地）；dev override 会注入正确值
      LIVEKIT_PUBLIC_URL: ${LIVEKIT_PUBLIC_URL:-ws://127.0.0.1:7880}
      # dev：把 APP_API_KEY 注入测试页（仅 127.0.0.1 可见时才安全）
      # prod：默认 false，要求客户端手动配置
      DEV_AUTO_INJECT_KEY: ${DEV_AUTO_INJECT_KEY:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      RTVOICE_KEYS_BACKEND: ${RTVOICE_KEYS_BACKEND:-yaml}
      RTVOICE_KEYS_FILE: ${RTVOICE_KEYS_FILE:-/data/keys/keys.yaml}
      RTVOICE_REDIS_URL: ${RTVOICE_REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ${RTVOICE_KEYS_HOST_DIR:-./data/keys}:/data/keys:rw
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=2).status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ---------------------------------------------------------------
  # Realtime Voice Service — multi-tenant session API + WS gateway (SP2)
  # ---------------------------------------------------------------
  realtime-server:
    build:
      context: .
      dockerfile: services/realtime-server/Dockerfile
    image: rtvoice/realtime-server:v0.19.0
    container_name: rtvoice-realtime
    profiles: ["dev", "prod"]
    restart: unless-stopped
    networks: [rtvoice_net]
    depends_on:
      stt-server:
        condition: service_healthy
      tts-server:
        condition: service_healthy
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      RTVOICE_API_KEY: ${RTVOICE_API_KEY:-}
      RTVOICE_CORS_ORIGINS: ${RTVOICE_CORS_ORIGINS:-*}
      STT_WS_URL: ws://stt-server:9090/v1/asr
      LLM_BASE_URL: ${LLM_BASE_URL:-http://llm-server:11434/v1}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:1.5b}
      LLM_API_KEY: ollama
      TTS_BASE_URL: http://tts-server:9880
      PUBLIC_WS_BASE: ${PUBLIC_WS_BASE:-ws://realtime-server:9000}
      AGENT_SYSTEM_PROMPT: ${AGENT_SYSTEM_PROMPT:-}
      AGENT_LLM_MAX_TOKENS: ${AGENT_LLM_MAX_TOKENS:-80}
      RTVOICE_MAX_CONCURRENT_SESSIONS: ${RTVOICE_MAX_CONCURRENT_SESSIONS:-5}
      RTVOICE_SESSION_QUEUE_DEPTH: ${RTVOICE_SESSION_QUEUE_DEPTH:-0}
      RTVOICE_SESSION_CREATE_TIMEOUT_S: ${RTVOICE_SESSION_CREATE_TIMEOUT_S:-60}
      RTVOICE_SESSION_IDLE_TIMEOUT_S: ${RTVOICE_SESSION_IDLE_TIMEOUT_S:-30}
      RTVOICE_SESSION_MAX_LIFETIME_S: ${RTVOICE_SESSION_MAX_LIFETIME_S:-1800}
      RTVOICE_WS_DISCONNECT_GRACE_S: ${RTVOICE_WS_DISCONNECT_GRACE_S:-0}
      RTVOICE_TURN_TIMEOUT_S: ${RTVOICE_TURN_TIMEOUT_S:-60}
      RTVOICE_MEMORY_MAX_TURNS: ${RTVOICE_MEMORY_MAX_TURNS:-6}
      RTVOICE_DEFAULT_PROMPT: ${RTVOICE_DEFAULT_PROMPT:-你是语音助手。用中文简短回答（≤2 句）。}
      RTVOICE_AUDIT_DIR: ${RTVOICE_AUDIT_DIR:-/data/transcripts}
      RTVOICE_AUDIT_QUEUE_MAX: ${RTVOICE_AUDIT_QUEUE_MAX:-1000}
      RTVOICE_PROMPT_MAX_CHARS: ${RTVOICE_PROMPT_MAX_CHARS:-2000}
      RTVOICE_KEYS_BACKEND: ${RTVOICE_KEYS_BACKEND:-yaml}
      RTVOICE_KEYS_FILE: ${RTVOICE_KEYS_FILE:-/data/keys/keys.yaml}
      RTVOICE_REDIS_URL: ${RTVOICE_REDIS_URL:-redis://redis:6379/0}
      # Admin Console 登录（用户名/密码）+ 会话 cookie 签名密钥
      RTVOICE_ADMIN_USERNAME: ${RTVOICE_ADMIN_USERNAME:-admin}
      RTVOICE_ADMIN_PASSWORD: ${RTVOICE_ADMIN_PASSWORD:-rtvoice-admin}
      RTVOICE_SESSION_SECRET: ${RTVOICE_SESSION_SECRET:-}
      RTVOICE_SESSION_COOKIE_SECURE: ${RTVOICE_SESSION_COOKIE_SECURE:-true}
      # Admin Console 代理 /v1/console/voices 转发到 tts-server 时注入的高权限 key
      TTS_ADMIN_API_KEY: ${TTS_ADMIN_API_KEY:-}
      TOKEN_BASE_URL: ${TOKEN_BASE_URL:-http://token-server:8000}
    volumes:
      - ${RTVOICE_AUDIT_HOST_DIR:-./data/transcripts}:/data/transcripts:rw
      - ${RTVOICE_KEYS_HOST_DIR:-./data/keys}:/data/keys:rw
    # Realtime 管线访问宿主 ollama（LLM_BASE_URL=http://host.docker.internal:11434/v1）
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:9000/health',timeout=2).status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.5"
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"

  # ---------------------------------------------------------------
  # Admin Console — Next.js 16 standalone（新版 Admin UI，挂 /admin-v2/）
  # ---------------------------------------------------------------
  admin-ui:
    build:
      context: ./clients/admin-ui
      dockerfile: Dockerfile
    image: rtvoice/admin-ui:v0.19.0
    container_name: rtvoice-admin-ui
    profiles: ["dev", "prod"]
    restart: unless-stopped
    networks: [rtvoice_net]
    environment:
      NODE_ENV: production
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/admin-v2/login',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ---------------------------------------------------------------
  # Agent Worker — v0.2 mock 引擎内嵌；v0.4+ 迁移到 livekit-agents 框架
  # ---------------------------------------------------------------
  agent-worker:
    build:
      context: ./services/agent-worker
      dockerfile: Dockerfile
    image: rtvoice/agent-worker:v0.19.0
    container_name: rtvoice-agent
    profiles: ["dev", "prod"]
    restart: unless-stopped
    networks: [rtvoice_net]
    depends_on:
      livekit-server:
        condition: service_healthy
      stt-server:
        condition: service_healthy
      llm-server:
        condition: service_healthy
      tts-server:
        condition: service_healthy
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      # 走 docker network 内部地址（不经宿主端口）
      LIVEKIT_INTERNAL_URL: ws://livekit-server:7880
      STT_WS_URL: ws://stt-server:9090/v1/asr
      LLM_BASE_URL: http://llm-server:11434/v1
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:1.5b}
      LLM_API_KEY: ollama   # ollama 不验证 key，但 OpenAI SDK 必需
      TTS_BASE_URL: http://tts-server:9880
      TTS_VOICE: ${TTS_VOICE:-zf_xiaobei}
      TTS_LANG: ${TTS_LANG:-cmn}
      TTS_PIPELINE_CONCURRENCY: ${TTS_PIPELINE_CONCURRENCY:-2}
      # 留空走代码内默认 prompt（30 字短回复）；想要更长/更自然回复就在 .env 设置
      AGENT_SYSTEM_PROMPT: ${AGENT_SYSTEM_PROMPT:-}
      AGENT_LLM_MAX_TOKENS: ${AGENT_LLM_MAX_TOKENS:-80}
      # 调用 stt/tts 时附带的 Bearer（必须与 stt/tts 服务的 RTVOICE_API_KEY 一致）
      RTVOICE_API_KEY: ${RTVOICE_API_KEY:-}
      METRICS_PORT: 9100
      # v0.6 实验性：AGENT_BACKEND=v06 走 livekit-agents 框架
      # 默认空（=v05）= 已验证可工作的自写 FSM 路径
      AGENT_BACKEND: ${AGENT_BACKEND:-}
      AGENT_ROOM: ${AGENT_ROOM:-rtvoice-test}
      AGENT_IDENTITY: ${AGENT_IDENTITY:-rtvoice-agent}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    expose:
      - "9100"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.5"
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"

  # ---------------------------------------------------------------
  # STT Server — sherpa-onnx 中文流式 Paraformer (CPU)
  # ---------------------------------------------------------------
  stt-server:
    build:
      context: .
      dockerfile: services/stt-server/Dockerfile
    image: rtvoice/stt-server:v0.20.0
    container_name: rtvoice-stt
    profiles: ["dev", "prod"]
    restart: unless-stopped
    networks: [rtvoice_net]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      STT_NUM_THREADS: ${STT_NUM_THREADS:-2}
      # SenseVoice 识别语言（auto|zh|en|ja|ko|yue）与反向文本归一化
      STT_LANGUAGE: ${STT_LANGUAGE:-auto}
      STT_USE_ITN: ${STT_USE_ITN:-true}
      # 软切分：长独白无 VAD 端点时，缓冲超过 MAX_S 秒强制提交一段、限制解码窗口长度（默认关）
      STT_SOFT_SEGMENT: ${STT_SOFT_SEGMENT:-false}
      STT_SOFT_SEGMENT_MAX_S: ${STT_SOFT_SEGMENT_MAX_S:-8.0}
      # Bearer 鉴权（留空 = 关闭，dev 默认；prod 暴露公网时必填）
      RTVOICE_API_KEY: ${RTVOICE_API_KEY:-}
      RTVOICE_CORS_ORIGINS: ${RTVOICE_CORS_ORIGINS:-*}
      RTVOICE_KEYS_BACKEND: ${RTVOICE_KEYS_BACKEND:-yaml}
      RTVOICE_KEYS_FILE: ${RTVOICE_KEYS_FILE:-/data/keys/keys.yaml}
      RTVOICE_REDIS_URL: ${RTVOICE_REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ${RTVOICE_KEYS_HOST_DIR:-./data/keys}:/data/keys:rw
    # 内部服务，端口不映射到宿主（仅 docker network 可达）
    expose:
      - "9090"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"

  # ---------------------------------------------------------------
  # LLM Server — ollama + Qwen2.5-1.5B (CPU)
  # OpenAI 兼容 API：POST /v1/chat/completions
  # ---------------------------------------------------------------
  llm-server:
    build:
      context: ./services/llm-server
      dockerfile: Dockerfile
    image: rtvoice/llm-server:v0.4.0
    container_name: rtvoice-llm
    # 仅 dev 启动；prod 默认走宿主 ollama（agent extra_hosts host.docker.internal）
    # 要在 prod 用 vLLM，单独 --profile prod-vllm（prod 覆盖文件已配 vLLM image）
    profiles: ["dev"]
    restart: unless-stopped
    networks: [rtvoice_net]
    environment:
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:1.5b}
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-5m}
    volumes:
      - rtvoice_ollama_models:/root/.ollama
    expose:
      - "11434"
    healthcheck:
      # 模型 pull 完成且 serve 正常后才 healthy
      test: ["CMD-SHELL", "ollama list 2>/dev/null | awk 'NR>1 {print $$1}' | grep -qx \"${LLM_MODEL:-qwen2.5:1.5b}\""]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 300s   # 首次 pull 给 5 分钟
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4.0"
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"

  # ---------------------------------------------------------------
  # TTS Server — Kokoro 82M ONNX (CPU dev) / CosyVoice 2 GPU (prod 切换)
  # ---------------------------------------------------------------
  tts-server:
    build:
      context: .
      dockerfile: services/tts-server/${TTS_DOCKERFILE:-Dockerfile}
    image: rtvoice/tts-server:v0.19.0
    container_name: rtvoice-tts
    profiles: ["dev", "prod"]
    restart: unless-stopped
    networks: [rtvoice_net]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TTS_DEFAULT_VOICE: ${TTS_DEFAULT_VOICE:-zf_xiaobei}
      TTS_DEFAULT_LANG: ${TTS_DEFAULT_LANG:-cmn}
      # Bearer 鉴权（与 STT 共享 key，agent-worker 同时用此 key 调用）
      RTVOICE_API_KEY: ${RTVOICE_API_KEY:-}
      RTVOICE_CORS_ORIGINS: ${RTVOICE_CORS_ORIGINS:-*}
      RTVOICE_KEYS_BACKEND: ${RTVOICE_KEYS_BACKEND:-yaml}
      RTVOICE_KEYS_FILE: ${RTVOICE_KEYS_FILE:-/data/keys/keys.yaml}
      RTVOICE_REDIS_URL: ${RTVOICE_REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ${RTVOICE_KEYS_HOST_DIR:-./data/keys}:/data/keys:rw
    expose:
      - "9880"
    deploy:
      resources:
        limits:
          # Kokoro 82M ONNX 在 CPU 上对核心数敏感；4 核可达约 0.7-1.0× realtime
          # 生产 v0.5+ 切 GPU 后 CPU 限制可降回 1.5
          memory: 2G
          cpus: "4.0"
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"

  # ---------------------------------------------------------------
  # Prometheus + Grafana 见 docker-compose.monitoring.yml（profile=monitoring）
  # 之前 base + monitoring 两处 duplicate 导致 volume mount 冲突（SP12 finding）
  # 现在唯一来源是 monitoring.yml overlay。
  # ---------------------------------------------------------------

  # ---------------------------------------------------------------
  # Redis (SP6 auth backend; profile=auth-redis enable)
  # ---------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: rtvoice-redis
    profiles: ["auth-redis"]
    restart: unless-stopped
    networks: [rtvoice_net]
    volumes:
      - rtvoice_redis_data:/data
    ports:
      - "${BIND_HOST:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
