# RTVoice 公共 compose 定义
# 用法：
#   开发：docker compose -f docker-compose.yml -f docker-compose.dev.yml --profile dev up -d
#   生产：docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile prod up -d
# 安全：见 SECURITY.md
#   - 端口默认绑 ${BIND_HOST}=127.0.0.1（dev），prod 由用户决策
#   - 镜像 pin 具体版本，禁用 :latest
#   - 不使用 --privileged / network=host

name: rtvoice

networks:
  rtvoice_net:
    driver: bridge

volumes:
  rtvoice_ollama_models:
    driver: local
  rtvoice_prom_data:
    driver: local
  rtvoice_grafana_data:
    driver: local

services:
  # ---------------------------------------------------------------
  # LiveKit WebRTC SFU
  # ---------------------------------------------------------------
  livekit-server:
    # 升级前请先到 https://github.com/livekit/livekit/releases 验证版本
    image: livekit/livekit-server:v1.11.0
    container_name: rtvoice-livekit
    profiles: ["dev", "prod"]
    restart: unless-stopped
    networks: [rtvoice_net]
    # LiveKit 接受 LIVEKIT_KEYS 环境变量，格式 "key: secret"
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    # 配置文件由 dev/prod override 挂载
    command: ["--config", "/etc/livekit.yaml"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:7880/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ---------------------------------------------------------------
  # Token Server (FastAPI) — 给客户端发 LiveKit JWT
  # ---------------------------------------------------------------
  token-server:
    build:
      context: ./services/token-server
      dockerfile: Dockerfile
    image: rtvoice/token-server:v0.1.0
    container_name: rtvoice-token
    profiles: ["dev", "prod"]
    restart: unless-stopped
    networks: [rtvoice_net]
    depends_on:
      livekit-server:
        condition: service_healthy
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      # /token 端点的访问 key（客户端 Bearer header）。必须 ≥ 32 字符。
      APP_API_KEY: ${APP_API_KEY}
      # 浏览器侧用的 ws URL（公网或本地）；dev override 会注入正确值
      LIVEKIT_PUBLIC_URL: ${LIVEKIT_PUBLIC_URL:-ws://127.0.0.1:7880}
      # dev：把 APP_API_KEY 注入测试页（仅 127.0.0.1 可见时才安全）
      # prod：默认 false，要求客户端手动配置
      DEV_AUTO_INJECT_KEY: ${DEV_AUTO_INJECT_KEY:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=2).status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ---------------------------------------------------------------
  # Realtime Voice Service — multi-tenant session API + WS gateway (SP2)
  # ---------------------------------------------------------------
  realtime-server:
    build:
      context: ./services/realtime-server
      dockerfile: Dockerfile
    image: rtvoice/realtime-server:v0.9.0
    container_name: rtvoice-realtime
    profiles: ["dev", "prod"]
    restart: unless-stopped
    networks: [rtvoice_net]
    depends_on:
      stt-server:
        condition: service_healthy
      tts-server:
        condition: service_healthy
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      RTVOICE_API_KEY: ${RTVOICE_API_KEY:-}
      STT_WS_URL: ws://stt-server:9090/v1/asr
      LLM_BASE_URL: ${LLM_BASE_URL:-http://llm-server:11434/v1}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:1.5b}
      LLM_API_KEY: ollama
      TTS_BASE_URL: http://tts-server:9880
      PUBLIC_WS_BASE: ${PUBLIC_WS_BASE:-ws://realtime-server:9000}
      AGENT_SYSTEM_PROMPT: ${AGENT_SYSTEM_PROMPT:-}
      AGENT_LLM_MAX_TOKENS: ${AGENT_LLM_MAX_TOKENS:-80}
      RTVOICE_MAX_CONCURRENT_SESSIONS: ${RTVOICE_MAX_CONCURRENT_SESSIONS:-5}
      RTVOICE_SESSION_QUEUE_DEPTH: ${RTVOICE_SESSION_QUEUE_DEPTH:-0}
      RTVOICE_SESSION_CREATE_TIMEOUT_S: ${RTVOICE_SESSION_CREATE_TIMEOUT_S:-60}
      RTVOICE_SESSION_IDLE_TIMEOUT_S: ${RTVOICE_SESSION_IDLE_TIMEOUT_S:-30}
      RTVOICE_SESSION_MAX_LIFETIME_S: ${RTVOICE_SESSION_MAX_LIFETIME_S:-1800}
      RTVOICE_WS_DISCONNECT_GRACE_S: ${RTVOICE_WS_DISCONNECT_GRACE_S:-0}
      RTVOICE_TURN_TIMEOUT_S: ${RTVOICE_TURN_TIMEOUT_S:-60}
      RTVOICE_MEMORY_MAX_TURNS: ${RTVOICE_MEMORY_MAX_TURNS:-6}
      RTVOICE_DEFAULT_PROMPT: ${RTVOICE_DEFAULT_PROMPT:-你是语音助手。用中文简短回答（≤2 句）。}
      RTVOICE_AUDIT_DIR: ${RTVOICE_AUDIT_DIR:-/data/transcripts}
      RTVOICE_AUDIT_QUEUE_MAX: ${RTVOICE_AUDIT_QUEUE_MAX:-1000}
      RTVOICE_PROMPT_MAX_CHARS: ${RTVOICE_PROMPT_MAX_CHARS:-2000}
    volumes:
      - ${RTVOICE_AUDIT_HOST_DIR:-./data/transcripts}:/data/transcripts:rw
    expose:
      - "9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:9000/health',timeout=2).status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.5"
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"

  # ---------------------------------------------------------------
  # Agent Worker — v0.2 mock 引擎内嵌；v0.4+ 迁移到 livekit-agents 框架
  # ---------------------------------------------------------------
  agent-worker:
    build:
      context: ./services/agent-worker
      dockerfile: Dockerfile
    image: rtvoice/agent-worker:v0.5.0
    container_name: rtvoice-agent
    profiles: ["dev", "prod"]
    restart: unless-stopped
    networks: [rtvoice_net]
    depends_on:
      livekit-server:
        condition: service_healthy
      stt-server:
        condition: service_healthy
      llm-server:
        condition: service_healthy
      tts-server:
        condition: service_healthy
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      # 走 docker network 内部地址（不经宿主端口）
      LIVEKIT_INTERNAL_URL: ws://livekit-server:7880
      STT_WS_URL: ws://stt-server:9090/v1/asr
      LLM_BASE_URL: http://llm-server:11434/v1
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:1.5b}
      LLM_API_KEY: ollama   # ollama 不验证 key，但 OpenAI SDK 必需
      TTS_BASE_URL: http://tts-server:9880
      TTS_VOICE: ${TTS_VOICE:-zf_xiaobei}
      TTS_LANG: ${TTS_LANG:-cmn}
      TTS_PIPELINE_CONCURRENCY: ${TTS_PIPELINE_CONCURRENCY:-2}
      # 留空走代码内默认 prompt（30 字短回复）；想要更长/更自然回复就在 .env 设置
      AGENT_SYSTEM_PROMPT: ${AGENT_SYSTEM_PROMPT:-}
      AGENT_LLM_MAX_TOKENS: ${AGENT_LLM_MAX_TOKENS:-80}
      # 调用 stt/tts 时附带的 Bearer（必须与 stt/tts 服务的 RTVOICE_API_KEY 一致）
      RTVOICE_API_KEY: ${RTVOICE_API_KEY:-}
      METRICS_PORT: 9100
      # v0.6 实验性：AGENT_BACKEND=v06 走 livekit-agents 框架
      # 默认空（=v05）= 已验证可工作的自写 FSM 路径
      AGENT_BACKEND: ${AGENT_BACKEND:-}
      AGENT_ROOM: ${AGENT_ROOM:-rtvoice-test}
      AGENT_IDENTITY: ${AGENT_IDENTITY:-rtvoice-agent}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    expose:
      - "9100"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.5"
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"

  # ---------------------------------------------------------------
  # STT Server — sherpa-onnx 中文流式 Paraformer (CPU)
  # ---------------------------------------------------------------
  stt-server:
    build:
      context: ./services/stt-server
      dockerfile: Dockerfile
    image: rtvoice/stt-server:v0.3.0
    container_name: rtvoice-stt
    profiles: ["dev", "prod"]
    restart: unless-stopped
    networks: [rtvoice_net]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      STT_NUM_THREADS: ${STT_NUM_THREADS:-2}
      # Bearer 鉴权（留空 = 关闭，dev 默认；prod 暴露公网时必填）
      RTVOICE_API_KEY: ${RTVOICE_API_KEY:-}
    # 内部服务，端口不映射到宿主（仅 docker network 可达）
    expose:
      - "9090"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"

  # ---------------------------------------------------------------
  # LLM Server — ollama + Qwen2.5-1.5B (CPU)
  # OpenAI 兼容 API：POST /v1/chat/completions
  # ---------------------------------------------------------------
  llm-server:
    build:
      context: ./services/llm-server
      dockerfile: Dockerfile
    image: rtvoice/llm-server:v0.4.0
    container_name: rtvoice-llm
    # 仅 dev 启动；prod 默认走宿主 ollama（agent extra_hosts host.docker.internal）
    # 要在 prod 用 vLLM，单独 --profile prod-vllm（prod 覆盖文件已配 vLLM image）
    profiles: ["dev"]
    restart: unless-stopped
    networks: [rtvoice_net]
    environment:
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:1.5b}
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-5m}
    volumes:
      - rtvoice_ollama_models:/root/.ollama
    expose:
      - "11434"
    healthcheck:
      # 模型 pull 完成且 serve 正常后才 healthy
      test: ["CMD-SHELL", "ollama list 2>/dev/null | awk 'NR>1 {print $$1}' | grep -qx \"${LLM_MODEL:-qwen2.5:1.5b}\""]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 300s   # 首次 pull 给 5 分钟
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4.0"
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"

  # ---------------------------------------------------------------
  # TTS Server — Kokoro 82M ONNX (CPU dev) / CosyVoice 2 GPU (prod 切换)
  # ---------------------------------------------------------------
  tts-server:
    build:
      context: ./services/tts-server
      dockerfile: Dockerfile
    image: rtvoice/tts-server:v0.5.0
    container_name: rtvoice-tts
    profiles: ["dev", "prod"]
    restart: unless-stopped
    networks: [rtvoice_net]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TTS_DEFAULT_VOICE: ${TTS_DEFAULT_VOICE:-zf_xiaobei}
      TTS_DEFAULT_LANG: ${TTS_DEFAULT_LANG:-cmn}
      # Bearer 鉴权（与 STT 共享 key，agent-worker 同时用此 key 调用）
      RTVOICE_API_KEY: ${RTVOICE_API_KEY:-}
    expose:
      - "9880"
    deploy:
      resources:
        limits:
          # Kokoro 82M ONNX 在 CPU 上对核心数敏感；4 核可达约 0.7-1.0× realtime
          # 生产 v0.5+ 切 GPU 后 CPU 限制可降回 1.5
          memory: 2G
          cpus: "4.0"
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"

  # ---------------------------------------------------------------
  # Prometheus + Grafana (SP4 A-lite, profile=monitoring 启用)
  # ---------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.0.0
    container_name: rtvoice-prometheus
    profiles: ["monitoring"]
    restart: unless-stopped
    networks: [rtvoice_net]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - rtvoice_prom_data:/prometheus
    ports:
      - "${BIND_HOST:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle

  grafana:
    image: grafana/grafana:11.4.0
    container_name: rtvoice-grafana
    profiles: ["monitoring"]
    restart: unless-stopped
    networks: [rtvoice_net]
    depends_on:
      - prometheus
    volumes:
      - ./monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - rtvoice_grafana_data:/var/lib/grafana
    ports:
      - "${BIND_HOST:-127.0.0.1}:${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/rtvoice-overview.json
