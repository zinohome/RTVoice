# RTVoice TLS 反向代理（Caddy）— v0.17 / SP11
#
# 模式：内网 LAN + Caddy 'tls internal' 自签证书（用户 2026-05-12 选 (b)）。
#       Caddy 是唯一对外 ingress（除 livekit-server WebRTC）。
#
# 用法：
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#                  -f docker-compose.tls.yml --profile prod up -d
#
# 客户端首次需信任 Caddy 自签 root CA：
#   ssh root@host 'docker exec rtvoice-caddy cat /data/caddy/pki/authorities/local/root.crt' > caddy-root.crt
#   # 导入到客户端系统信任链；或 curl -k 跳过校验（自测）
#
# 端口：
#   - 443/tcp HTTPS / WSS（唯一对外）
#   - 80/tcp  Caddy 内部用（不强制 redirect）
#   - 7880/tcp + 7881/tcp + 50000-50099/udp livekit-server（WebRTC，独立路径）
#
# 路由见 caddy/Caddyfile。

services:
  caddy:
    image: caddy:2.8-alpine
    container_name: rtvoice-caddy
    profiles: ["dev", "prod"]
    restart: unless-stopped
    networks: [rtvoice_net]
    ports:
      - "${BIND_HOST:-0.0.0.0}:80:80"
      - "${BIND_HOST:-0.0.0.0}:443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - rtvoice_caddy_data:/data
      - rtvoice_caddy_config:/config
    depends_on:
      stt-server:
        condition: service_healthy
      tts-server:
        condition: service_healthy
      token-server:
        condition: service_healthy
      realtime-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-qO-", "https://localhost/v1/openapi/token.json"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # TLS 模式下 RTVoice 业务 service **全部** 不再 bind 宿主端口
  # 唯一 ingress = Caddy 443
  stt-server:
    ports: !override []

  tts-server:
    ports: !override []

  token-server:
    ports: !override []

  realtime-server:
    ports: !override []

volumes:
  rtvoice_caddy_data:
    driver: local
  rtvoice_caddy_config:
    driver: local
